[module]
name = "cost-aware-optimizer"
version = "0.1.0"
edition = "2025"
description = "Cost-model-aware compilation optimizer that selects strategies per target architecture"

[dependencies]
MAGE_cost_oracle = { path = "../../crates/MAGE_cost_oracle" }
MAGE_cost_calibrate = { path = "../../crates/MAGE_cost_calibrate" }
MAGE_agentic_bench = { path = "../../crates/MAGE_agentic_bench" }
MAGE_pipeline_compose = { path = "../../crates/MAGE_pipeline_compose" }
MAGE_token_budget = { path = "../../crates/MAGE_token_budget" }

[agent]
swarm-size = 4
consensus = "cost-weighted"
mode = "optimizer"

[safety]
mode = "contracts"
cost-ceiling = "1000ms"
