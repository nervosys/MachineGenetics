[package]
name = "redox_public"
version = "0.1.0-preview"
edition = "2024"

[dependencies]
# tidy-alphabetical-start
redox_abi = { path = "../redox_abi" }
redox_hir = { path = "../redox_hir" }
redox_middle = { path = "../redox_middle" }
redox_public_bridge = { path = "../redox_public_bridge" }
redox_session = { path = "../redox_session" }
redox_span = { path = "../redox_span" }
redox_target = { path = "../redox_target" }
scoped-tls = "1.0"
serde = { version = "1.0.125", features = ["derive"] }
tracing = "0.1"
# tidy-alphabetical-end

[dev-dependencies]
# tidy-alphabetical-start
serde_json = "1.0.142"
# tidy-alphabetical-end

[features]
# tidy-alphabetical-start
