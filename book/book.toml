[book]
title = "The MechGen Programming Language"
authors = ["The MechGen Project"]
description = "A comprehensive guide to the MechGen agentic-first programming language"
language = "en"
src = "src"

[build]
build-dir = "build"
create-missing = false

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/nervosys/MechGen"
edit-url-template = "https://github.com/nervosys/MechGen/edit/master/book/{path}"
