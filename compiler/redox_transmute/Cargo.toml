[package]
name = "redox_transmute"
version = "0.0.0"
edition = "2024"

[dependencies]
# tidy-alphabetical-start
redox_abi = { path = "../redox_abi", optional = true }
redox_data_structures = { path = "../redox_data_structures" }
redox_hir = { path = "../redox_hir", optional = true }
redox_middle = { path = "../redox_middle", optional = true }
redox_span = { path = "../redox_span", optional = true }
smallvec = "1.8.1"
tracing = "0.1"
# tidy-alphabetical-end

[dev-dependencies]
# tidy-alphabetical-start
itertools = "0.12"
# tidy-alphabetical-end

[features]
# tidy-alphabetical-start
redox = [
    "dep:redox_abi",
    "dep:redox_hir",
    "dep:redox_middle",
    "dep:redox_span",
]
# tidy-alphabetical-end
