[package]
name = "redox_query"
version = "0.1.0"
edition = "2021"
description = "Stable query API for the Redox compiler — externalizes core compiler queries for agents"
license = "MIT OR Apache-2.0"

[lib]
name = "redox_query"
path = "src/lib.rs"

[dependencies]
redox_diagnostics = { path = "../redox_diagnostics" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
