[module]
name = "cost-aware-optimizer"
version = "0.1.0"
edition = "2025"
description = "Cost-model-aware compilation optimizer that selects strategies per target architecture"

[dependencies]
MechGen_cost_oracle = { path = "../../crates/MechGen_cost_oracle" }
MechGen_cost_calibrate = { path = "../../crates/MechGen_cost_calibrate" }
MechGen_agentic_bench = { path = "../../crates/MechGen_agentic_bench" }
MechGen_pipeline_compose = { path = "../../crates/MechGen_pipeline_compose" }
MechGen_token_budget = { path = "../../crates/MechGen_token_budget" }

[agent]
swarm-size = 4
consensus = "cost-weighted"
mode = "optimizer"

[safety]
mode = "contracts"
cost-ceiling = "1000ms"
