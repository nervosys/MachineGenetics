[module]
name = "cost-aware-optimizer"
version = "0.1.0"
edition = "2025"
description = "Cost-model-aware compilation optimizer that selects strategies per target architecture"

[dependencies]
redox_cost_oracle = { path = "../../crates/redox_cost_oracle" }
redox_cost_calibrate = { path = "../../crates/redox_cost_calibrate" }
redox_agentic_bench = { path = "../../crates/redox_agentic_bench" }
redox_pipeline_compose = { path = "../../crates/redox_pipeline_compose" }
redox_token_budget = { path = "../../crates/redox_token_budget" }

[agent]
swarm-size = 4
consensus = "cost-weighted"
mode = "optimizer"

[safety]
mode = "contracts"
cost-ceiling = "1000ms"
