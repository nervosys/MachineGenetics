[workspace]

[package]
name = "rdx"
version = "0.1.0"
edition = "2024"
description = "The Redox language CLI — build, check, test, format, and manage Redox projects"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
colored = "2"

[[bin]]
name = "rdx"
path = "src/main.rs"
