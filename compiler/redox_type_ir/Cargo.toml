[package]
name = "redox_type_ir"
version = "0.0.0"
edition = "2024"

[dependencies]
# tidy-alphabetical-start
arrayvec = { version = "0.7", default-features = false }
bitflags = "2.4.1"
derive-where = "1.2.7"
ena = "0.14.4"
indexmap = "2.0.0"
rustc-hash = "2.0.0"
redox_abi = { path = "../redox_abi", default-features = false }
redox_ast_ir = { path = "../redox_ast_ir", default-features = false }
redox_data_structures = { path = "../redox_data_structures", optional = true }
redox_error_messages = { path = "../redox_error_messages", optional = true }
redox_index = { path = "../redox_index", default-features = false }
redox_macros = { path = "../redox_macros", optional = true }
redox_serialize = { path = "../redox_serialize", optional = true }
redox_span = { path = "../redox_span", optional = true }
redox_type_ir_macros = { path = "../redox_type_ir_macros" }
smallvec = { version = "1.8.1", default-features = false, features = ["const_generics"] }
thin-vec = "0.2.12"
tracing = "0.1"
# tidy-alphabetical-end

[features]
# tidy-alphabetical-start
default = ["nightly"]
nightly = [
    "dep:redox_data_structures",
    "dep:redox_error_messages",
    "dep:redox_macros",
    "dep:redox_serialize",
    "dep:redox_span",
    "redox_ast_ir/nightly",
    "redox_index/nightly",
    "redox_type_ir_macros/nightly",
    "smallvec/may_dangle",
    "smallvec/union",
]
# tidy-alphabetical-end
