[package]
name = "redox_next_trait_solver"
version = "0.0.0"
edition = "2024"

[dependencies]
# tidy-alphabetical-start
derive-where = "1.2.7"
redox_data_structures = { path = "../redox_data_structures", optional = true }
redox_index = { path = "../redox_index", default-features = false }
redox_macros = { path = "../redox_macros", optional = true }
redox_type_ir = { path = "../redox_type_ir", default-features = false }
redox_type_ir_macros = { path = "../redox_type_ir_macros" }
tracing = "0.1"
# tidy-alphabetical-end

[features]
# tidy-alphabetical-start
default = ["nightly"]
nightly = [
    "dep:redox_data_structures",
    "dep:redox_macros",
    "redox_index/nightly",
    "redox_type_ir/nightly",
]
# tidy-alphabetical-end
