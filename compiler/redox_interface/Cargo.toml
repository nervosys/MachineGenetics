[package]
name = "redox_interface"
version = "0.0.0"
edition = "2024"

[dependencies]
# tidy-alphabetical-start
redox_ast = { path = "../redox_ast" }
redox_ast_lowering = { path = "../redox_ast_lowering" }
redox_ast_passes = { path = "../redox_ast_passes" }
redox_ast_pretty = { path = "../redox_ast_pretty" }
redox_attr_parsing = { path = "../redox_attr_parsing" }
redox_borrowck = { path = "../redox_borrowck" }
redox_builtin_macros = { path = "../redox_builtin_macros" }
redox_codegen_llvm = { path = "../redox_codegen_llvm", optional = true }
redox_codegen_ssa = { path = "../redox_codegen_ssa" }
redox_const_eval = { path = "../redox_const_eval" }
redox_data_structures = { path = "../redox_data_structures" }
redox_errors = { path = "../redox_errors" }
redox_expand = { path = "../redox_expand" }
redox_feature = { path = "../redox_feature" }
redox_fs_util = { path = "../redox_fs_util" }
redox_hir = { path = "../redox_hir" }
redox_hir_analysis = { path = "../redox_hir_analysis" }
redox_hir_typeck = { path = "../redox_hir_typeck" }
redox_incremental = { path = "../redox_incremental" }
redox_lint = { path = "../redox_lint" }
redox_macros = { path = "../redox_macros" }
redox_metadata = { path = "../redox_metadata" }
redox_middle = { path = "../redox_middle" }
redox_mir_build = { path = "../redox_mir_build" }
redox_mir_transform = { path = "../redox_mir_transform" }
redox_monomorphize = { path = "../redox_monomorphize" }
redox_parse = { path = "../redox_parse" }
redox_passes = { path = "../redox_passes" }
redox_privacy = { path = "../redox_privacy" }
redox_query_impl = { path = "../redox_query_impl" }
redox_resolve = { path = "../redox_resolve" }
redox_session = { path = "../redox_session" }
redox_span = { path = "../redox_span" }
redox_symbol_mangling = { path = "../redox_symbol_mangling" }
redox_target = { path = "../redox_target" }
redox_thread_pool = { path = "../redox_thread_pool" }
redox_trait_selection = { path = "../redox_trait_selection" }
redox_traits = { path = "../redox_traits" }
redox_ty_utils = { path = "../redox_ty_utils" }
tracing = "0.1"
# tidy-alphabetical-end

[dev-dependencies]
# tidy-alphabetical-start
redox_abi = { path = "../redox_abi" }
# tidy-alphabetical-end

[features]
# tidy-alphabetical-start
check_only = ['redox_codegen_llvm?/check_only']
llvm = ['dep:redox_codegen_llvm']
llvm_enzyme = ['redox_builtin_macros/llvm_enzyme', 'redox_codegen_llvm/llvm_enzyme']
llvm_offload = ['redox_codegen_llvm/llvm_offload']
# tidy-alphabetical-end
