# MechGen PR Check — fast feedback on pull requests.
#
# Lightweight checks that run on every PR touching MechGen ecosystem files.
# Focuses on speed: lint + test only, no multi-platform builds.

name: MechGen PR

on:
  pull_request:
    branches: [master]
    paths:
      - "tools/**"
      - "examples/**"
      - "stdlib/**"
      - "skb/**"
      - "prototype/**"

permissions:
  contents: read

concurrency:
  group: MechGen-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Quick Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/*/target
          key: cargo-pr-${{ hashFiles('tools/**/Cargo.toml') }}
          restore-keys: cargo-pr-

      # Format checks.
      - name: Format check
        run: |
          cd tools/RUST2MG && cargo fmt --check
          cd ../MG2RS && cargo fmt --check
          cd ../rdx && cargo fmt --check

      # Clippy.
      - name: Clippy
        run: |
          cd tools/RUST2MG && cargo clippy --all-targets -- -D warnings
          cd ../MG2RS && cargo clippy --all-targets -- -D warnings
          cd ../rdx && cargo clippy --all-targets -- -D warnings

      # Tests.
      - name: Test RUST2MG
        working-directory: tools/RUST2MG
        run: cargo test

      - name: Test MG2RS
        working-directory: tools/MG2RS
        run: cargo test

      - name: Test rdx CLI
        working-directory: tools/rdx
        run: cargo test

      - name: Test prototype
        working-directory: prototype
        run: cargo test

      # Validate ecosystem artifacts.
      - name: Validate examples
        run: |
          for dir in examples/*/; do
            name=$(basename "$dir")
            [ -f "$dir/Forge.toml" ] || { echo "FAIL: $dir/Forge.toml missing"; exit 1; }
            [ -f "$dir/src/main.mg" ] || { echo "FAIL: $dir/src/main.mg missing"; exit 1; }
            echo "  OK: $name"
          done

      - name: Validate SKB JSON
        run: |
          for f in skb/rules/*.json; do
            python3 -c "import json; json.load(open('$f'))" || { echo "FAIL: $f"; exit 1; }
            echo "  OK: $(basename $f)"
          done
