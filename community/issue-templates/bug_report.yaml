name: Bug Report
description: Report a bug in the MAGE language, compiler, or tools
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for filing a bug report! Please fill in the details below
        to help us diagnose and fix the issue.

  - type: input
    id: version
    attributes:
      label: MAGE Version
      description: Output of `mg --version`
      placeholder: mg 0.1.0
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of MAGE is affected?
      options:
        - Compiler / Parser
        - rust2mg Transpiler
        - mg2rs Back-Transpiler
        - mg CLI
        - Standard Library
        - VS Code Extension
        - Editor Integration (Neovim/Helix/Zed)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: Minimal code and steps to reproduce the bug
      value: |
        **MAGE code:**
        ```MAGE
        // paste your .mg code here
        ```

        **Steps:**
        1. Run `mg build`
        2. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include error messages)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: Windows 11, macOS 14, Ubuntu 24.04
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other relevant information (backtraces, screenshots, etc.)
    validations:
      required: false
